<mat-toolbar>
  <span>Sistema de Usuários</span>
</mat-toolbar>

<div class="page-container">

  <mat-form-field appearance="outline" style="width: 100%">
    <mat-label>Buscar usuário</mat-label>
    <input matInput [formControl]="searchControl">
  </mat-form-field>

  <div class="loading-container" *ngIf="loading()">
    <mat-spinner></mat-spinner>
  </div>

  <div class="error-container" *ngIf="error()">
    Erro ao carregar usuários
  </div>

  <div class="cards">

    <mat-card class="user-card" *ngFor="let user of users()">

      <mat-card-title>
        {{ user.nome }}
      </mat-card-title>

      <mat-card-content>
        <p>{{ user.email }}</p>
        <p>{{ user.telefone }}</p>
      </mat-card-content>

      <mat-card-actions>
        <button
          mat-raised-button
          color="primary"
          (click)="openEditModal(user)">
          Editar
        </button>

        <button
          mat-button
          color="warn"
          (click)="deleteUser(user)">
          Excluir
        </button>
      </mat-card-actions>

    </mat-card>

  </div>

</div>

<button
  mat-fab
  color="warn"
  class="fab-button"
  (click)="openCreateModal()">

  +
</button>
