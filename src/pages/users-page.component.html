<input [formControl]="search" placeholder="Buscar usuário..." />

<!-- 🔥 SKELETON -->
<app-skeleton *ngIf="loading()" [count]="6"></app-skeleton>

<!-- LISTA REAL -->
<div *ngIf="!loading()" class="grid">
  <div class="card" *ngFor="let user of users$ | async">
    <h3>{{ user.nome }}</h3>
    <p>{{ user.email }}</p>

    <button mat-button color="primary">
      Editar
    </button>
  </div>
  <input [formControl]="search" placeholder="Buscar..." />

<!-- LOADING -->
<div *ngIf="loading()">Carregando...</div>

<!-- LISTA -->
<div *ngIf="!loading() && response() as res">

  <div class="grid">
    <div class="card" *ngFor="let user of res.content">
      <h3>{{ user.nome }}</h3>
      <p>{{ user.email }}</p>
    </div>
  </div>

  <!-- PAGINAÇÃO -->
  <div class="pagination">

    <button (click)="prevPage()" [disabled]="page() === 0">
      ⬅ Anterior
    </button>

    <span>
      Página {{ page() + 1 }} de {{ res.totalPages }}
    </span>

    <button
      (click)="nextPage()"
      [disabled]="page() >= res.totalPages - 1"
    >
      Próxima ➡
    </button>

  </div>

</div>
</div>
